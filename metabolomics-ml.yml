name: metabolomics-ml
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pytorch=2.2
  - matchms=0.26          # MS/MS spectral processing; was in npomix via pyteomics
  - pyteomics             # MGF/mzML parsing — directly from npomix
  - numpy
  - pandas
  - scikit-learn
  - scipy
  - jupyter
  - matplotlib
  - seaborn
  - umap-learn            # dimensionality reduction
  - tqdm
  - wandb
  - lxml                  # from npomix; XML parsing for mzML
  - requests
  - pyyaml
  - pip:
    - spec2vec
    - ms2deepscore
